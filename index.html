        { title: "„Ш„Х„°„Ш „Р„С„Х„І„У„Х „Ґ„Э „С„Щ„¶„Ф „Ґ„Ь„Х„Ю„Ф",               category: "„Р„®„Х„Ч„™ „С„Х„І„®",  url: "https://search.app/ZTU6pLrw8ARJdEkL6",                                                                                                                                                    img: "https://images.unsplash.com/photo-1525351484163-7529414344d8?w=600&auto=format" },
        { title: "„С„Щ„¶„Ф „Ґ„Ь„Х„Ю„Ф „Ю„Х„©„Ь„Ю„™ - „†„Ш„Ґ „Ь„Х„Щ„Ф",            category: "„Р„®„Х„Ч„™ „С„Х„І„®",  url: "https://search.app/nmvGoch3Ev8b9epPA",                                                                                                                                                    img: "https://images.unsplash.com/photo-1510693206972-df098062cb71?w=600&auto=format" },
        { title: "„§„Р„Щ„Щ„Ф „Ґ„Э „Ш„Х„®„Х „Щ„®„І„Х„™",                       category: "„Р„®„Х„Ч„™ „С„Х„І„®",  url: "https://www.hashulchan.co.il/%D7%9E%D7%AA%D7%9B%D7%95%D7%A0%D7%99%D7%9D/%D7%A4%D7%90%D7%99%D7%99%D7%94-%D7%A2%D7%9D-%D7%98%D7%95%D7%A8%D7%95-%D7%A9%D7%9C-%D7%90%D7%99%D7%A0%D7%98%D7%99%D7%90%D7%A1-%D7%95%D7%99%D7%A8%D7%A7%D7%95%D7%AA/", img: "https://images.unsplash.com/photo-1590412200988-a436970781fa?w=600&auto=format" }

    ]; // „°„Х„£ staticRecipes

    // вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
    let userRecipes = JSON.parse(localStorage.getItem('myRecipes')) || [];
    let activeCategory = '„Ф„Ы„Ь';

    const CATEGORY_COLORS = {
        '„Ю„®„І„Щ„Э':        'bg-blue-100 text-blue-700',
        '„С„©„®':           'bg-red-100 text-red-700',
        '„У„Т„Щ„Э':          'bg-cyan-100 text-cyan-700',
        '„°„Ь„Ш„Щ„Э':         'bg-green-100 text-green-700',
        '„Р„°„Щ„Р„™„Щ':        'bg-yellow-100 text-yellow-700',
        '„Ю„Р„§„Щ„Э':         'bg-orange-100 text-orange-700',
        '„Ь„Ч„Ю„Щ„Э':         'bg-amber-100 text-amber-700',
        '„§„°„Ш„Ф':          'bg-purple-100 text-purple-700',
        '„І„Щ„†„Х„Ч„Щ„Э':       'bg-pink-100 text-pink-700',
        '„¶„Ю„Ч„Х„†„Щ':        'bg-lime-100 text-lime-700',
        '„Р„®„Х„Ч„™ „С„Х„І„®':   'bg-indigo-100 text-indigo-700',
        '„Ы„Ь„Ь„Щ':          'bg-slate-100 text-slate-600'
    };

    function getCategoryColor(cat) {
        return CATEGORY_COLORS[cat] || 'bg-slate-100 text-slate-600';
    }

    function buildCategoryFilters(allRecipes) {
        var counts = {};
        allRecipes.forEach(function(r) { counts[r.category] = (counts[r.category] || 0) + 1; });
        var cats = ['„Ф„Ы„Ь'].concat(Object.keys(counts).sort());
        var container = document.getElementById('categoryFilters');
        container.innerHTML = cats.map(function(c) {
            var isActive = c === activeCategory;
            var countLabel = c === '„Ф„Ы„Ь' ? allRecipes.length : (counts[c] || 0);
            return '<button onclick="setCategory(\'' + c + '\')" class="text-xs font-semibold px-3 py-1 rounded-full border transition-all ' +
                (isActive
                    ? 'bg-white text-orange-700 border-white shadow'
                    : 'bg-orange-700/30 text-orange-100 border-orange-500/40 hover:bg-orange-100 hover:text-orange-700') + '">' +
                c + ' <span class="opacity-70">(' + countLabel + ')</span></button>';
        }).join('');
    }

    function setCategory(cat) {
        activeCategory = cat;
        render();
    }

    function render() {
        var term = document.getElementById('searchInput').value.toLowerCase().trim();
        var grid = document.getElementById('recipesGrid');
        var allRecipes = userRecipes.concat(staticRecipes);

        var filtered = allRecipes.filter(function(r) {
            var matchesTerm = !term ||
                r.title.toLowerCase().includes(term) ||
                r.category.toLowerCase().includes(term);
            var matchesCat = activeCategory === '„Ф„Ы„Ь' || r.category === activeCategory;
            return matchesTerm && matchesCat;
        });

        document.getElementById('totalCount').textContent = allRecipes.length + ' „Ю„™„Ы„Х„†„Щ„Э';
        buildCategoryFilters(allRecipes);

        if (filtered.length === 0) {
            grid.innerHTML = '<div class="col-span-full text-center py-20 text-slate-400 text-lg">„Ь„Р „†„Ю„¶„Р„Х „Ю„™„Ы„Х„†„Щ„Э...</div>';
            return;
        }

        var fallback = 'https://images.unsplash.com/photo-1495195129352-aec325a55b65?w=600&auto=format';

        grid.innerHTML = filtered.map(function(r) {
            var colorClass = getCategoryColor(r.category);
            return [
                '<div class="recipe-card bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 flex flex-col h-full">',
                  '<div class="card-img h-44 overflow-hidden relative">',
                    '<img src="' + (r.img || fallback) + '" ',
                         'class="w-full h-full object-cover" loading="lazy" ',
                         'onerror="this.src=\'' + fallback + '\'">',
                    '<span class="absolute top-3 right-3 ' + colorClass + ' px-3 py-1 rounded-full text-xs font-bold shadow-sm">' + r.category + '</span>',
                    (r._user ? '<span class="absolute top-3 left-3 bg-orange-500 text-white px-2 py-1 rounded-full text-xs font-bold">вЬ® „©„Ь„Щ</span>' : ''),
                  '</div>',
                  '<div class="p-5 flex-grow flex flex-col justify-between items-start">',
                    '<h3 class="text-lg font-bold text-slate-800 mb-4 leading-snug">' + r.title + '</h3>',
                    '<a href="' + r.url + '" target="_blank" rel="noopener noreferrer" ',
                       'class="w-full py-3 bg-orange-600 text-white text-center rounded-xl font-bold hover:bg-orange-700 active:scale-95 transition-all shadow-md text-sm">',
                      '„¶„§„Ф „С„Ю„™„Ы„Х„Я „Ф„Ю„Ь„Р вЖЧ',
                    '</a>',
                  '</div>',
                '</div>'
            ].join('');
        }).join('');

        lucide.createIcons();
    }

    function toggleAddModal() {
        document.getElementById('addModal').classList.toggle('hidden');
    }

    function addRecipe() {
        var title    = document.getElementById('newTitle').value.trim();
        var url      = document.getElementById('newUrl').value.trim();
        var category = document.getElementById('newCat').value;
        if (!title || !url) { alert('„†„Р „Ь„Ю„Ь„Р „©„Э „Х„Ь„Щ„†„І'); return; }

        var imgMap = {
            '„Ю„®„І„Щ„Э':       'https://images.unsplash.com/photo-1476718406336-bb5a9690ee2a?w=600&auto=format',
            '„С„©„®':          'https://images.unsplash.com/photo-1558030006-450675393462?w=600&auto=format',
            '„У„Т„Щ„Э':         'https://images.unsplash.com/photo-1534604973900-c41ab4c5e636?w=600&auto=format',
            '„°„Ь„Ш„Щ„Э':        'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=600&auto=format',
            '„Р„°„Щ„Р„™„Щ':       'https://images.unsplash.com/photo-1559339352-11d035aa65de?w=600&auto=format',
            '„Ю„Р„§„Щ„Э':        'https://images.unsplash.com/photo-1509440159596-0249088772ff?w=600&auto=format',
            '„Ь„Ч„Ю„Щ„Э':        'https://images.unsplash.com/photo-1586444248902-2f64eddc13df?w=600&auto=format',
            '„§„°„Ш„Ф':         'https://images.unsplash.com/photo-1551183053-bf91a1d81141?w=600&auto=format',
            '„І„Щ„†„Х„Ч„Щ„Э':      'https://images.unsplash.com/photo-1568571780765-9276ac6b75bb?w=600&auto=format',
            '„¶„Ю„Ч„Х„†„Щ':       'https://images.unsplash.com/photo-1541832676-9b763b0239ab?w=600&auto=format',
            '„Р„®„Х„Ч„™ „С„Х„І„®':  'https://images.unsplash.com/photo-1525351484163-7529414344d8?w=600&auto=format',
            '„Ы„Ь„Ь„Щ':         'https://images.unsplash.com/photo-1495195129352-aec325a55b65?w=600&auto=format'
        };

        userRecipes.unshift({
            title: title,
            url: url,
            category: category,
            img: imgMap[category] || imgMap['„Ы„Ь„Ь„Щ'],
            _user: true
        });

        localStorage.setItem('myRecipes', JSON.stringify(userRecipes));
        render();
        toggleAddModal();
        document.getElementById('newTitle').value = '';
        document.getElementById('newUrl').value = '';
        document.getElementById('newCat').value = '„Ы„Ь„Ь„Щ';
    }

    document.getElementById('searchInput').addEventListener('input', render);
    window.onload = function() { render(); lucide.createIcons(); };
    </script>
