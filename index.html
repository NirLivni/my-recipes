<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5STARS RECIPES - המאגר המשפחתי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; }
        .recipe-card:hover { transform: translateY(-4px); transition: all 0.3s ease; }
    </style>
</head>
<body class="text-slate-900">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <h1 class="text-2xl font-bold text-slate-800">5STARS RECIPES ⭐️</h1>
            <div class="flex gap-2 w-full md:w-auto">
                <input type="text" id="searchInput" placeholder="חפש מתכון..." class="w-full md:w-64 px-4 py-2 bg-slate-100 border-none rounded-lg focus:ring-2 focus:ring-orange-400 outline-none">
                <button onclick="toggleAddModal()" class="bg-orange-500 text-white px-4 py-2 rounded-lg font-bold hover:bg-orange-600 flex items-center gap-2 whitespace-nowrap">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> הוסף מתכון
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-10">
        <div id="recipesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <div id="addModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[100] px-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-slate-800">הוספת מתכון חדש</h2>
            <div class="space-y-4">
                <input type="text" id="newTitle" placeholder="שם המתכון" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:border-orange-500">
                <input type="text" id="newUrl" placeholder="לינק למתכון (WhatsApp/Web)" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:border-orange-500">
                <select id="newCat" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                    <option value="כללי">בחר קטגוריה</option>
                    <option value="מרקים">מרקים</option>
                    <option value="בשר">בשר</option>
                    <option value="דגים">דגים</option>
                    <option value="סלטים">סלטים</option>
                    <option value="קינוחים">קינוחים</option>
                </select>
                <div class="flex gap-2 pt-2">
                    <button onclick="addRecipe()" class="flex-1 bg-orange-500 text-white py-3 rounded-xl font-bold hover:bg-orange-600 transition-colors">שמור מתכון</button>
                    <button onclick="toggleAddModal()" class="flex-1 bg-slate-200 text-slate-700 py-3 rounded-xl font-bold hover:bg-slate-300 transition-colors">ביטול</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // המאגר שחולץ מהווטסאפ שלכם
        const initialRecipes = [
            { title: "מרק דלעת, כמון ותפוזים", category: "מרקים", url: "https://www.hashulchan.co.il/%D7%9E%D7%AA%D7%9B%D7%95%D7%A0%D7%99%D7%9D/%D7%9E%D7%A8%D7%A7-%D7%93%D7%9C%D7%A2%D7%AA-%D7%91%D7%A0%D7%99%D7%97%D7%95%D7%97-%D7%9Adjust-%D7%9E%D7%95%D7%9F-%D7%95%D7%AA%D7%A4%D7%95%D7%96%D7%99%D7%9D/", img: "https://images.unsplash.com/photo-1547592166-23ac45744acd?w=600" },
            { title: "מרק כרובית וחלב שקדים", category: "מרקים", url: "https://www.hashulchan.co.il/%D7%9E%D7%AA%D7%9B%D7%95%D7%A0%D7%99%D7%9D/%D7%9E%D7%A8%D7%A7-%D7%9B%D7%A8%D7%95%D7%91%D7%99%D7%AA-%D7%A2%D7%9D-%D7%97%D7%9C%D7%91-%D7%A9%D7%A7%D7%93%D7%99%D7%9D/", img: "https://images.unsplash.com/photo-1594756202469-9ff9799b2e42?w=600" },
            { title: "בשר מפורק בבישול ארוך", category: "בשר", url: "https://www.10dakot.co.il/recipe/%D7%90%D7%A1%D7%90%D7%93%D7%95-%D7%9E%D7%A4%D7%95%D7%A8%D7%A7/", img: "https://images.unsplash.com/photo-1551024506-0bccd828d307?w=600" },
            { title: "דג מרוקאי של נירה", category: "דגים", url: "#", img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?w=600" },
            { title: "ראמן עוף של אהרוני", category: "מרקים", url: "https://share.google/ydCRteDbgbYBf4vVb", img: "https://images.unsplash.com/photo-1547592166-23ac45744acd?w=600" },
            { title: "קאצ'ו א פפה - מושיקו גמליאל", category: "איטלקי", url: "https://search.app/i6dnymho4szMDDBV9", img: "https://images.unsplash.com/photo-1551183053-bf91a1d81141?w=600" },
            { title: "חריימה של שף רפי כהן", category: "דגים", url: "https://search.app/JxXRT9xBwYmjHzWFA", img: "https://images.unsplash.com/photo-1534604973900-c41ab4c5e636?w=600" },
            { title: "סלופי ג'ו קלאסי", category: "בשר", url: "https://search.app/fSJXr9fUZCM1j7Wz5", img: "https://images.unsplash.com/photo-1544025162-d76694265947?w=600" }
        ];

        let recipes = [...initialRecipes];

        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('recipesGrid');
            grid.innerHTML = recipes.filter(r => r.title.toLowerCase().includes(term) || r.category.toLowerCase().includes(term))
                .map(r => `
                <a href="${r.url}" target="_blank" class="recipe-card bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-200 block transition-all">
                    <div class="h-48 overflow-hidden relative">
                        <img src="${r.img}" class="w-full h-full object-cover">
