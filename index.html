        'פסטה': 'bg-purple-900/50 text-purple-300 border-purple-800',
        'קינוחים': 'bg-pink-900/50 text-pink-300 border-pink-800',
        'צמחוני': 'bg-emerald-900/50 text-emerald-300 border-emerald-800',
        'לחמים': 'bg-amber-900/50 text-amber-300 border-amber-800'
    };

    function render() {
        const term = document.getElementById('searchInput').value.toLowerCase().trim();
        const grid = document.getElementById('recipesGrid');
        const allRecipes = userRecipes.concat(staticRecipes);
        
        const filtered = allRecipes.filter(r => {
            const matchesTerm = !term || r.title.toLowerCase().includes(term) || r.category.toLowerCase().includes(term);
            const matchesCat = activeCategory === 'הכל' || r.category === activeCategory;
            return matchesTerm && matchesCat;
        });

        document.getElementById('totalCount').textContent = allRecipes.length + ' מתכונים';
        buildCategoryFilters(allRecipes);

        if (filtered.length === 0) {
            grid.innerHTML = '<div class="col-span-full text-center py-20 text-slate-500 text-xl">לא מצאנו שום דבר כזה... 🥣</div>';
            return;
        }

        grid.innerHTML = filtered.map(r => `
            <div class="recipe-card rounded-[2rem] overflow-hidden flex flex-col h-full shadow-2xl">
                <div class="h-52 overflow-hidden relative">
                    <img src="${r.img}" class="w-full h-full object-cover grayscale-[20%] hover:grayscale-0 transition-all duration-500" loading="lazy">
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 to-transparent"></div>
                    <span class="absolute top-4 right-4 text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full border ${CATEGORY_COLORS[r.category] || 'bg-slate-800 text-slate-300 border-slate-700'}">
                        ${r.category}
                    </span>
                    ${r._user ? '<span class="absolute top-4 left-4 bg-orange-600 text-white text-[10px] font-black px-3 py-1 rounded-full">חדש</span>' : ''}
                </div>
                <div class="p-8 flex-grow flex flex-col justify-between bg-slate-800/40">
                    <h3 class="text-xl font-bold text-white mb-6 leading-tight">${r.title}</h3>
                    <a href="${r.url}" target="_blank" class="w-full py-4 bg-orange-600 text-white text-center rounded-2xl font-black hover:bg-orange-500 active:scale-95 transition-all shadow-lg shadow-orange-900/20 text-sm tracking-wide">
                        למתכון המלא ↗
                    </a>
                </div>
            </div>
        `).join('');
        lucide.createIcons();
    }

    function buildCategoryFilters(allRecipes) {
        const counts = {};
        allRecipes.forEach(r => counts[r.category] = (counts[r.category] || 0) + 1);
        const cats = ['הכל', ...Object.keys(counts).sort()];
        const container = document.getElementById('categoryFilters');
        container.innerHTML = cats.map(c => {
            const isActive = c === activeCategory;
            return `
                <button onclick="setCategory('${c}')" class="category-btn text-xs font-bold px-4 py-2 rounded-full border transition-all whitespace-nowrap
                ${isActive ? 'bg-orange-600 border-orange-600 text-white shadow-lg' : 'bg-slate-800 border-slate-700 text-slate-400 hover:border-slate-500 hover:text-white'}">
                    ${c}
                </button>
            `;
        }).join('');
    }

    function setCategory(cat) {
        activeCategory = cat;
        render();
    }

    function toggleAddModal() { document.getElementById('addModal').classList.toggle('hidden'); }

    function addRecipe() {
        const title = document.getElementById('newTitle').value.trim();
        const url = document.getElementById('newUrl').value.trim();
        const category = document.getElementById('newCat').value;
        if (!title || !url) return alert('חסר שם או לינק!');

        userRecipes.unshift({ title, url, category, img: 'https://images.unsplash.com/photo-1495195129352-aec325a55b65?w=600', _user: true });
        localStorage.setItem('myRecipes', JSON.stringify(userRecipes));
        render();
        toggleAddModal();
        document.getElementById('newTitle').value = '';
        document.getElementById('newUrl').value = '';
    }

    document.getElementById('searchInput').addEventListener('input', render);
    window.onload = () => { render(); lucide.createIcons(); };
    </script>
</body>
</html>
