        { title: "ОљОеОЋОЌОф ОўОљОцОљОА ОАОцОеОЊОЎОф", category: "ОдОъОЌОЋОаОЎ", url: "https://www.haaretz.co.il/food/dining/2011-11-11/ty-article/0000017f-df9e-db5a-a57f-dffe61080000", img: "https://img.haarets.co.il/bs/0000017f-df9e-db5a-a57f-dffe5d040000/be/f9/44d6aab8d7f9fc1c3af4f0dfd56e/3080872886.jpg?&width=1500&height=872&cmsprod" },
        { title: "ОўОЋОАОў ОљОЉОЋОДОЊОЋ ОЋОЉОЎОдОћ ОбОюОЋОъОћ", category: "ОљОеОЋОЌОф ОЉОЋОДОе", url: "https://www.ronyohananov.com/post/%D7%98%D7%95%D7%A1%D7%98-%D7%90%D7%91%D7%95%D7%A7%D7%93%D7%95-%D7%A2%D7%9D-%D7%91%D7%99%D7%A6%D7%94-%D7%A2%D7%9C%D7%95%D7%9E%D7%94-%D7%90%D7%A8%D7%95%D7%97%D7%AA-%D7%91%D7%95%D7%A7%D7%A8-%D7%9E%D7%94%D7%97%D7%9C%D7%95%D7%9E%D7%95%D7%AA", img: "https://static.wixstatic.com/media/ea4d13_b237779bc7454329be262541d5dc1bc6~mv2.jpg/v1/fill/w_1480,h_1974,al_c,q_90,usm_0.66_1.00_0.01,enc_avif,quality_auto/ea4d13_b237779bc7454329be262541d5dc1bc6~mv2.jpg" },
        { title: "ОЉОЎОдОћ ОбОюОЋОъОћ ОъОЋОЕОюОъОф", category: "ОљОеОЋОЌОф ОЉОЋОДОе", url: "https://search.app/nmvGoch3Ev8b9epPA", img: "https://medias.hashulchan.co.il/www/uploads/2019/08/step_005low-2000x1125.jpg" },
        { title: "ОцОљОЎОЎОћ ОўОЋОеОЋ ОЎОеОДОЋОф", category: "ОљОеОЋОЌОф ОЉОЋОДОе", url: "https://www.hashulchan.co.il/%D7%9E%D7%AA%D7%9B%D7%95%D7%A0%D7%99%D7%9D/%D7%A4%D7%90%D7%99%D7%99%D7%94/", img: "https://medias.hashulchan.co.il/www/uploads/2019/08/rice-paiea-2-e1564915280160-2000x1125.jpg" }
    ];

    let userRecipes = JSON.parse(localStorage.getItem('myRecipes')) || [];
    let activeCategory = 'ОћОЏОю';

    const CATEGORY_COLORS = {
        'ОъОеОДОЎОЮ': 'bg-blue-950/80 text-blue-200 border-blue-800/50',
        'ОЉОЕОе': 'bg-red-950/80 text-red-200 border-red-800/50',
        'ОЊОњОЎОЮ': 'bg-cyan-950/80 text-cyan-200 border-cyan-800/50',
        'ОАОюОўОЎОЮ': 'bg-green-950/80 text-green-200 border-green-800/50',
        'ОљОАОЎОљОфОЎ': 'bg-yellow-950/80 text-yellow-200 border-yellow-800/50',
        'ОъОљОцОЎОЮ': 'bg-orange-950/80 text-orange-200 border-orange-800/50',
        'ОюОЌОъОЎОЮ': 'bg-amber-950/80 text-amber-200 border-amber-800/50',
        'ОцОАОўОћ': 'bg-purple-950/80 text-purple-200 border-purple-800/50',
        'ОДОЎОаОЋОЌОЎОЮ': 'bg-pink-950/80 text-pink-200 border-pink-800/50',
        'ОдОъОЌОЋОаОЎ': 'bg-emerald-950/80 text-emerald-200 border-emerald-800/50',
        'ОљОеОЋОЌОф ОЉОЋОДОе': 'bg-indigo-950/80 text-indigo-200 border-indigo-700/50'
    };

    function getCategoryColor(cat) { return CATEGORY_COLORS[cat] || 'bg-slate-800 text-slate-300 border-slate-700'; }

    function render() {
        const term = document.getElementById('searchInput').value.toLowerCase().trim();
        const grid = document.getElementById('recipesGrid');
        const allRecipes = userRecipes.concat(staticRecipes);
        
        const filtered = allRecipes.filter(r => {
            const matchesTerm = !term || r.title.toLowerCase().includes(term) || r.category.toLowerCase().includes(term);
            const matchesCat = activeCategory === 'ОћОЏОю' || r.category === activeCategory;
            return matchesTerm && matchesCat;
        });

        document.getElementById('totalCount').textContent = allRecipes.length + ' ОъОфОЏОЋОаОЎОЮ';
        buildCategoryFilters(allRecipes);

        if (filtered.length === 0) {
            grid.innerHTML = '<div class="col-span-full text-center py-20 text-slate-500 text-xl">ОюОљ ОъОдОљОаОЋ ОЕОЋОЮ ОЊОЉОе ОЏОќОћ... ­ЪЦБ</div>';
            return;
        }

        grid.innerHTML = filtered.map(r => {
            const colorClass = getCategoryColor(r.category);
            const fallback = r.searchTag 
                ? `https://source.unsplash.com/featured/600x400/?${encodeURIComponent(r.searchTag)}` 
                : 'https://images.unsplash.com/photo-1495195129352-aec325a55b65?w=600&auto=format';
            
            const sourceName = getSourceName(r.url);
            
            return `
                <div class="recipe-card overflow-hidden flex flex-col h-full shadow-lg">
                    <div class="h-52 overflow-hidden relative border-b border-slate-700/50 bg-slate-900">
                        <img src="${r.img || fallback}" 
                             class="w-full h-full object-cover transition-transform duration-500 hover:scale-105" 
                             loading="lazy" 
                             onerror="this.src='${fallback}'">
                        
                        <span class="absolute top-4 right-4 text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full border ${colorClass}">
                            ${r.category}
                        </span>
                        ${r._user ? '<span class="absolute top-4 left-4 bg-amber-500 text-amber-950 text-[10px] font-black px-3 py-1 rounded-full shadow-lg">ОЌОЊОЕ</span>' : ''}
                    </div>
                    <div class="p-6 flex-grow flex flex-col justify-between">
                        <div>
                            <h3 class="text-xl font-bold text-white mb-2 leading-snug">${r.title}</h3>
                            ${sourceName ? `<p class="text-sm text-slate-400 mb-6 font-semibold">${sourceName}</p>` : '<div class="mb-6"></div>'}
                        </div>
                        
                        <a href="${r.url}" target="_blank" class="w-full py-3.5 bg-amber-500 text-amber-950 text-center rounded-2xl font-black hover:bg-amber-400 active:scale-95 transition-all shadow-lg shadow-amber-900/20 text-sm tracking-wide">
                            ОюОъОфОЏОЋОЪ ОћОъОюОљ
                        </a>
                    </div>
                </div>
            `;
        }).join('');
        
        lucide.createIcons();
    }

    function buildCategoryFilters(allRecipes) {
        const counts = {};
        allRecipes.forEach(r => counts[r.category] = (counts[r.category] || 0) + 1);
        const cats = ['ОћОЏОю', ...Object.keys(counts).sort()];
        document.getElementById('categoryFilters').innerHTML = cats.map(c => `
            <button onclick="setCategory('${c}')" class="text-xs font-bold px-4 py-2 rounded-full border transition-all whitespace-nowrap
            ${c === activeCategory ? 'bg-amber-500 border-amber-500 text-amber-950 shadow-lg' : 'bg-slate-800 border-slate-700 text-slate-400 hover:text-white'}">
                ${c} <span class="opacity-60 font-normal">(${c === 'ОћОЏОю' ? allRecipes.length : counts[c]})</span>
            </button>
        `).join('');
    }

    function setCategory(cat) { activeCategory = cat; render(); }
    function toggleAddModal() { document.getElementById('addModal').classList.toggle('hidden'); }
    
    function addRecipe() {
        const title = document.getElementById('newTitle').value.trim();
        const url = document.getElementById('newUrl').value.trim();
        const category = document.getElementById('newCat').value;
        if (!title || !url) return alert('ОЌОАОе ОЕОЮ ОљОЋ ОюОЎОаОД!');
        
        userRecipes.unshift({ title, url, category, img: '', _user: true });
        localStorage.setItem('myRecipes', JSON.stringify(userRecipes));
        render();
        toggleAddModal();
        document.getElementById('newTitle').value = '';
        document.getElementById('newUrl').value = '';
    }

    document.getElementById('searchInput').addEventListener('input', render);
    window.onload = function() { render(); };
    </script>
</body>
</html>
