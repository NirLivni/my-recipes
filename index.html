        // טעינת מתכונים מהזיכרון המקומי
        let userRecipes = JSON.parse(localStorage.getItem('myRecipes')) || [];
        let allRecipes = [...userRecipes, ...staticRecipes];

        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('recipesGrid');
            
            const filtered = allRecipes.filter(r => 
                r.title.toLowerCase().includes(term) || 
                r.category.toLowerCase().includes(term)
            );

            grid.innerHTML = filtered.map(r => `
                <div class="recipe-card bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-200 flex flex-col">
                    <div class="h-44 overflow-hidden relative">
                        <img src="${r.img}" class="w-full h-full object-cover">
                        <span class="absolute top-3 right-3 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-xs font-bold text-slate-700 shadow-sm">${r.category}</span>
                    </div>
                    <div class="p-5 flex-grow flex flex-col justify-between items-start">
                        <h3 class="text-xl font-bold text-slate-800 mb-4 leading-tight">${r.title}</h3>
                        <a href="${r.url}" target="_blank" class="w-full py-3 bg-orange-500 text-white text-center rounded-xl font-bold hover:bg-orange-600 transition-colors shadow-md shadow-orange-100">
                            צפה במתכון המלא
                        </a>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function toggleAddModal() { document.getElementById('addModal').classList.toggle('hidden'); }

        function addRecipe() {
            const title = document.getElementById('newTitle').value;
            const url = document.getElementById('newUrl').value;
            const category = document.getElementById('newCat').value;
            
            if(!title || !url) return alert('נא למלא שם ולינק');
            
            const newRecipe = { 
                title, 
                url, 
                category, 
                img: "https://images.unsplash.com/photo-1495195129352-aec325a55b65?w=600" 
            };

            userRecipes.unshift(newRecipe);
            localStorage.setItem('myRecipes', JSON.stringify(userRecipes));
            allRecipes = [...userRecipes, ...staticRecipes];
            
            render();
            toggleAddModal();
            
            document.getElementById('newTitle').value = "";
            document.getElementById('newUrl').value = "";
        }

        document.getElementById('searchInput').addEventListener('input', render);
        window.onload = () => { render(); lucide.createIcons(); };
    </script>
