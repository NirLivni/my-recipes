<head>
    <meta charset="UTF-8">

    <title>MyRecipes ⭐️ המאגר המשפחתי</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

 <style>
        body { 
            font-family: 'Assistant', sans-serif; 
            background-color: #020617; /* שחור עמוק מאוד */
            color: #f8fafc;
        }
        
        /* כרטיס מתכון יוקרתי - חלק וקריא, תמונות בהירות */
        .recipe-card { 
            transition: all 0.3s ease; 
            background-color: #1e293b; /* רקע כהה אטום (Slate 800) */
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        
        .recipe-card:hover { 
            transform: translateY(-8px); 
            background-color: #334155; /* מתבהר קלות במעבר עכבר */
            border-color: #fbbf24; /* גבול זהב-ענברי (Amber 400) */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        /* לחצן זהב יוקרתי חדש */
        .gold-button {
            background-color: #fbbf24; /* זהב-ענברי (Amber 400) */
            color: #451a03; /* טקסט כהה מאוד לקריאות */
            box-shadow: 0 10px 15px -3px rgba(251, 191, 36, 0.2);
        }
        
        .gold-button:hover {
            background-color: #f59e0b; /* ענבר כהה יותר (Amber 500) */
            box-shadow: 0 20px 25px -5px rgba(251, 191, 36, 0.4);
        }

        /* עיצוב אחיד לשורת חיפוש ולטפסים */
        input, select {
            background-color: #0f172a !important; /* Slate 900 */
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        
        input:focus, select:focus { 
            border-color: #fbbf24 !important; /* זהב-ענברי */
            outline: none; 
            ring: 1px solid #fbbf24;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

    <header class="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-xl border-b border-slate-800/50 shadow-2xl">

                <h1 class="text-4xl font-black tracking-tighter text-white cursor-pointer hover:text-orange-500 transition-colors" onclick="window.location.reload()">MyRecipes</h1>
                <span id="totalCount" class="bg-slate-800/80 text-orange-400 text-xs font-black px-3 py-1 rounded-full border border-slate-700"></span>
            </div>
            
            <div class="flex gap-3 w-full md:w-auto">
                <div class="relative w-full md:w-96">
                    <i data-lucide="search" class="absolute right-4 top-3.5 w-5 h-5 text-slate-500"></i>
                    <input type="text" id="searchInput" placeholder="חפש מתכון..." class="w-full pr-12 pl-4 py-3 rounded-2xl outline-none transition-all shadow-inner">
                </div>
                <button onclick="toggleAddModal()" class="bg-orange-600 text-white px-8 py-3 rounded-2xl font-bold hover:bg-orange-500 active:scale-95 transition-all flex items-center gap-2 shrink-0 shadow-lg shadow-orange-900/40">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> הוספה
                </button>
            </div>
        </div>
        <div class="max-w-6xl mx-auto px-4 pb-4 flex flex-wrap gap-2 overflow-x-auto no-scrollbar" id="categoryFilters"></div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <div id="recipesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="col-span-full text-center py-20 text-slate-500 text-xl">טוען מתכונים... 🥣</div>
        </div>
    </main>

    <div id="addModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[100] p-4 backdrop-blur-sm">

            <div class="space-y-5">

                <input type="text" id="newUrl" placeholder="לינק למתכון" class="w-full p-4 rounded-2xl">
                <select id="newCat" class="w-full p-4 rounded-2xl">

                    <button onclick="toggleAddModal()" class="flex-1 bg-slate-800 py-5 rounded-2xl font-bold hover:bg-slate-700 transition-all text-white">ביטול</button>
                </div>
            </div>

        { title: "צ'ילי קון קארנה חריף",                      category: "צמחוני",      url: "https://www.haaretz.co.il/food/dining/2011-11-11/ty-article/0000017f-df9e-db5a-a57f-dffe61080000",                                                                                        img: "https://images.unsplash.com/photo-1604908177453-7462950a6a3b?w=600&auto=format" },

        // ── ארוחת בוקר ──
        { title: "טוסט אבוקדו עם ביצה עלומה",               category: "ארוחת בוקר",  url: "https://search.app/ZTU6pLrw8ARJdEkL6",                                                                                                                                                    img: "https://images.unsplash.com/photo-1525351484163-7529414344d8?w=600&auto=format" },
        { title: "ביצה עלומה מושלמת - נטע לויה",            category: "ארוחת בוקר",  url: "https://search.app/nmvGoch3Ev8b9epPA",                                                                                                                                                    img: "https://images.unsplash.com/photo-1510693206972-df098062cb71?w=600&auto=format" },
        { title: "פאייה עם טורו ירקות",                       category: "ארוחת בוקר",  url: "https://www.hashulchan.co.il/%D7%9E%D7%AA%D7%9B%D7%95%D7%A0%D7%99%D7%9D/%D7%A4%D7%90%D7%99%D7%99%D7%94-%D7%A2%D7%9D-%D7%98%D7%95%D7%A8%D7%95-%D7%A9%D7%9C-%D7%90%D7%99%D7%A0%D7%98%D7%99%D7%90%D7%A1-%D7%95%D7%99%D7%A8%D7%A7%D7%95%D7%AA/", img: "https://images.unsplash.com/photo-1590412200988-a436970781fa?w=600&auto=format" }

    ];

    let userRecipes = JSON.parse(localStorage.getItem('myRecipes')) || [];
    let activeCategory = 'הכל';

    // צבעים מותאמים לעיצוב השחור היוקרתי
    const CATEGORY_COLORS = {
        'מרקים': 'bg-blue-900/60 text-blue-300 border-blue-700/50',
        'בשר': 'bg-red-900/60 text-red-300 border-red-700/50',
        'דגים': 'bg-cyan-900/60 text-cyan-300 border-cyan-700/50',
        'סלטים': 'bg-green-900/60 text-green-300 border-green-700/50',
        'אסיאתי': 'bg-yellow-900/60 text-yellow-300 border-yellow-700/50',
        'מאפים': 'bg-orange-900/60 text-orange-300 border-orange-700/50',
        'לחמים': 'bg-amber-900/60 text-amber-300 border-amber-700/50',
        'פסטה': 'bg-purple-900/60 text-purple-300 border-purple-700/50',
        'קינוחים': 'bg-pink-900/60 text-pink-300 border-pink-700/50',
        'צמחוני': 'bg-emerald-900/60 text-emerald-300 border-emerald-700/50',
        'ארוחת בוקר': 'bg-indigo-900/60 text-indigo-300 border-indigo-700/50'
    };

    function getCategoryColor(cat) { return CATEGORY_COLORS[cat] || 'bg-slate-800 text-slate-300 border-slate-700'; }

    function render() {
        const term = document.getElementById('searchInput').value.toLowerCase().trim();
        const grid = document.getElementById('recipesGrid');
        const allRecipes = userRecipes.concat(staticRecipes);
        
        const filtered = allRecipes.filter(r => {
            const matchesTerm = !term || r.title.toLowerCase().includes(term) || r.category.toLowerCase().includes(term);
            const matchesCat = activeCategory === 'הכל' || r.category === activeCategory;
            return matchesTerm && matchesCat;
        });

        document.getElementById('totalCount').textContent = allRecipes.length + ' מתכונים';
        buildCategoryFilters(allRecipes);

        if (filtered.length === 0) {
            grid.innerHTML = '<div class="col-span-full text-center py-20 text-slate-500 text-xl">לא מצאנו שום דבר כזה... 🥣</div>';
            return;
        }

        grid.innerHTML = filtered.map(r => {
            const colorClass = getCategoryColor(r.category);
            const fallback = 'https://images.unsplash.com/photo-1495195129352-aec325a55b65?w=600&auto=format';
            return `
                <div class="recipe-card overflow-hidden flex flex-col h-full">
                    <div class="h-52 overflow-hidden relative">
<img src="${r.img || fallback}" class="w-full h-full object-cover transition-transform duration-500 hover:scale-105" loading="lazy" onerror="this.src='${fallback}'">
                                                <span class="absolute top-4 right-4 text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full border ${colorClass}">
                            ${r.category}
                        </span>
                        ${r._user ? '<span class="absolute top-4 left-4 bg-orange-600 text-white text-[10px] font-black px-3 py-1 rounded-full">חדש</span>' : ''}
                    </div>
                    <div class="p-6 flex-grow flex flex-col justify-between">
                        <h3 class="text-xl font-bold text-white mb-6 leading-snug">${r.title}</h3>
                        <a href="${r.url}" target="_blank" class="w-full py-3.5 gold-button text-center rounded-2xl font-black active:scale-95 transition-all text-sm tracking-wide">
    למתכון המלא ↗

                        </a>
                    </div>
                </div>
            `;
        }).join('');
        
        lucide.createIcons();
    }

    function buildCategoryFilters(allRecipes) {
        const counts = {};
        allRecipes.forEach(r => counts[r.category] = (counts[r.category] || 0) + 1);
        const cats = ['הכל', ...Object.keys(counts).sort()];
        document.getElementById('categoryFilters').innerHTML = cats.map(c => `
            <button onclick="setCategory('${c}')" class="text-xs font-bold px-4 py-2 rounded-full border transition-all whitespace-nowrap
            ${c === activeCategory ? 'bg-orange-600 border-orange-600 text-white shadow-lg' : 'bg-slate-800/80 border-slate-700 text-slate-400 hover:text-white'}">
                ${c} <span class="opacity-60 font-normal">(${c === 'הכל' ? allRecipes.length : counts[c]})</span>
            </button>
        `).join('');
    }

    function setCategory(cat) { activeCategory = cat; render(); }
    function toggleAddModal() { document.getElementById('addModal').classList.toggle('hidden'); }
    
    function addRecipe() {
        const title = document.getElementById('newTitle').value.trim();
        const url = document.getElementById('newUrl').value.trim();
        const category = document.getElementById('newCat').value;
        if (!title || !url) return alert('חסר שם או לינק!');
        
        userRecipes.unshift({ title, url, category, img: 'https://images.unsplash.com/photo-1495195129352-aec325a55b65?w=600', _user: true });
        localStorage.setItem('myRecipes', JSON.stringify(userRecipes));
        render();
        toggleAddModal();
        document.getElementById('newTitle').value = '';
        document.getElementById('newUrl').value = '';
    }

    document.getElementById('searchInput').addEventListener('input', render);
    window.onload = function() { render(); };
    </script>
</body>
</html>
