<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyRecipes ⭐️ המאגר המשפחתי</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Assistant', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
        }
        
        .recipe-card { 
            transition: all 0.3s ease; 
            background-color: #1e293b; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        
        .recipe-card:hover { 
            transform: translateY(-8px); 
            background-color: #334155; 
            border-color: #f59e0b; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        input, select {
            background-color: #0f172a !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        
        input:focus, select:focus { 
            border-color: #f59e0b !important; 
            outline: none; 
            ring: 1px solid #f59e0b;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="pb-20">

    <header class="sticky top-0 z-50 bg-slate-950/90 border-b border-slate-800/50 shadow-2xl backdrop-blur-md">
        <div class="max-w-6xl mx-auto px-4 py-5 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <h1 class="text-4xl font-black tracking-tighter text-white cursor-pointer hover:text-amber-500 transition-colors" onclick="window.location.reload()">MyRecipes</h1>
                <span id="totalCount" class="bg-slate-800 text-amber-500 text-xs font-black px-3 py-1 rounded-full border border-slate-700"></span>
            </div>
            
            <div class="flex gap-3 w-full md:w-auto">
                <div class="relative w-full md:w-96">
                    <i data-lucide="search" class="absolute right-4 top-3.5 w-5 h-5 text-slate-500"></i>
                    <input type="text" id="searchInput" placeholder="חפש מתכון במאגר..." class="w-full pr-12 pl-4 py-3 rounded-2xl outline-none transition-all shadow-inner">
                </div>
                <button onclick="toggleAddModal()" class="bg-amber-500 text-amber-950 px-8 py-3 rounded-2xl font-black hover:bg-amber-400 active:scale-95 transition-all flex items-center gap-2 shrink-0 shadow-lg shadow-amber-900/20">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> הוספה
                </button>
            </div>
        </div>
        <div class="max-w-6xl mx-auto px-4 pb-4 flex flex-wrap gap-2 overflow-x-auto no-scrollbar" id="categoryFilters"></div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <div id="recipesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="col-span-full text-center py-20 text-slate-500 text-xl">טוען מתכונים... 🥣</div>
        </div>
    </main>

    <div id="addModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
        <div class="bg-slate-900 border border-slate-700 rounded-[2.5rem] p-10 w-full max-w-lg shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-3xl font-black mb-8 flex items-center gap-3 text-white"><i data-lucide="chef-hat" class="text-amber-500"></i> הוספת מתכון</h2>
            <div class="space-y-5">
                <input type="text" id="newTitle" placeholder="שם המנה" class="w-full p-4 rounded-2xl">
                <input type="text" id="newUrl" placeholder="לינק למתכון" class="w-full p-4 rounded-2xl">
                <select id="newCat" class="w-full p-4 rounded-2xl">
                    <option value="כללי">בחר קטגוריה</option>
                    <option value="מרקים">מרקים</option>
                    <option value="בשר">בשר</option>
                    <option value="דגים">דגים</option>
                    <option value="סלטים">סלטים</option>
                    <option value="אסיאתי">אסיאתי</option>
                    <option value="מאפים">מאפים</option>
                    <option value="פסטה">פסטה</option>
                    <option value="קינוחים">קינוחים</option>
                    <option value="צמחוני">צמחוני</option>
                    <option value="לחמים">לחמים</option>
                    <option value="ארוחת בוקר">ארוחת בוקר</option>
                </select>
                <div class="flex gap-4 mt-10 p-2">
                    <button onclick="addRecipe()" class="flex-1 bg-amber-500 text-amber-950 py-5 rounded-2xl font-black hover:bg-amber-400 transition-all">שמור למאגר</button>
                    <button onclick="toggleAddModal()" class="flex-1 bg-slate-800 py-5 rounded-2xl font-bold hover:bg-slate-700 transition-all text-white">ביטול</button>
                </div>
            </div>
        </div>
    </div>

    ];

    let userRecipes = JSON.parse(localStorage.getItem('myRecipes')) || [];
    let activeCategory = 'הכל';

    const CATEGORY_COLORS = {
        'מרקים': 'bg-blue-950/80 text-blue-200 border-blue-800/50',
        'בשר': 'bg-red-950/80 text-red-200 border-red-800/50',
        'דגים': 'bg-cyan-950/80 text-cyan-200 border-cyan-800/50',
        'סלטים': 'bg-green-950/80 text-green-200 border-green-800/50',
        'אסיאתי': 'bg-yellow-950/80 text-yellow-200 border-yellow-800/50',
        'מאפים': 'bg-orange-950/80 text-orange-200 border-orange-800/50',
        'לחמים': 'bg-amber-950/80 text-amber-200 border-amber-800/50',
        'פסטה': 'bg-purple-950/80 text-purple-200 border-purple-800/50',
        'קינוחים': 'bg-pink-950/80 text-pink-200 border-pink-800/50',
        'צמחוני': 'bg-emerald-950/80 text-emerald-200 border-emerald-800/50',
        'ארוחת בוקר': 'bg-indigo-950/80 text-indigo-200 border-indigo-700/50'
    };

    function getCategoryColor(cat) { return CATEGORY_COLORS[cat] || 'bg-slate-800 text-slate-300 border-slate-700'; }

    function render() {
        const term = document.getElementById('searchInput').value.toLowerCase().trim();
        const grid = document.getElementById('recipesGrid');
        const allRecipes = userRecipes.concat(staticRecipes);
        
        const filtered = allRecipes.filter(r => {
            const matchesTerm = !term || r.title.toLowerCase().includes(term) || r.category.toLowerCase().includes(term);
            const matchesCat = activeCategory === 'הכל' || r.category === activeCategory;
            return matchesTerm && matchesCat;
        });

        document.getElementById('totalCount').textContent = allRecipes.length + ' מתכונים';
        buildCategoryFilters(allRecipes);

        if (filtered.length === 0) {
            grid.innerHTML = '<div class="col-span-full text-center py-20 text-slate-500 text-xl">לא מצאנו שום דבר כזה... 🥣</div>';
            return;
        }

        grid.innerHTML = filtered.map(r => {
            const colorClass = getCategoryColor(r.category);
            const fallback = r.searchTag 
                ? `https://source.unsplash.com/featured/600x400/?${encodeURIComponent(r.searchTag)}` 
                : 'https://images.unsplash.com/photo-1495195129352-aec325a55b65?w=600&auto=format';
            
            const sourceName = getSourceName(r.url);
            
            return `
                <div class="recipe-card overflow-hidden flex flex-col h-full shadow-lg">
                    <div class="h-52 overflow-hidden relative border-b border-slate-700/50 bg-slate-900">
                        <img src="${r.img || fallback}" 
                             class="w-full h-full object-cover transition-transform duration-500 hover:scale-105" 
                             loading="lazy" 
                             onerror="this.src='${fallback}'">
                        
                        <span class="absolute top-4 right-4 text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full border ${colorClass}">
                            ${r.category}
                        </span>
                        ${r._user ? '<span class="absolute top-4 left-4 bg-amber-500 text-amber-950 text-[10px] font-black px-3 py-1 rounded-full shadow-lg">חדש</span>' : ''}
                    </div>
                    <div class="p-6 flex-grow flex flex-col justify-between">
                        <div>
                            <h3 class="text-xl font-bold text-white mb-2 leading-snug">${r.title}</h3>
                            ${sourceName ? `<p class="text-sm text-slate-400 mb-6 font-semibold">${sourceName}</p>` : '<div class="mb-6"></div>'}
                        </div>
                        
                        <a href="${r.url}" target="_blank" class="w-full py-3.5 bg-amber-500 text-amber-950 text-center rounded-2xl font-black hover:bg-amber-400 active:scale-95 transition-all shadow-lg shadow-amber-900/20 text-sm tracking-wide">
                            למתכון המלא
                        </a>
                    </div>
                </div>
            `;
        }).join('');
        
        lucide.createIcons();
    }

    function buildCategoryFilters(allRecipes) {
        const counts = {};
        allRecipes.forEach(r => counts[r.category] = (counts[r.category] || 0) + 1);
        const cats = ['הכל', ...Object.keys(counts).sort()];
        document.getElementById('categoryFilters').innerHTML = cats.map(c => `
            <button onclick="setCategory('${c}')" class="text-xs font-bold px-4 py-2 rounded-full border transition-all whitespace-nowrap
            ${c === activeCategory ? 'bg-amber-500 border-amber-500 text-amber-950 shadow-lg' : 'bg-slate-800 border-slate-700 text-slate-400 hover:text-white'}">
                ${c} <span class="opacity-60 font-normal">(${c === 'הכל' ? allRecipes.length : counts[c]})</span>
            </button>
        `).join('');
    }

    function setCategory(cat) { activeCategory = cat; render(); }
    function toggleAddModal() { document.getElementById('addModal').classList.toggle('hidden'); }
    
    function addRecipe() {
        const title = document.getElementById('newTitle').value.trim();
        const url = document.getElementById('newUrl').value.trim();
        const category = document.getElementById('newCat').value;
        if (!title || !url) return alert('חסר שם או לינק!');
        
        userRecipes.unshift({ title, url, category, img: '', _user: true });
        localStorage.setItem('myRecipes', JSON.stringify(userRecipes));
        render();
        toggleAddModal();
        document.getElementById('newTitle').value = '';
        document.getElementById('newUrl').value = '';
    }

    document.getElementById('searchInput').addEventListener('input', render);
    window.onload = function() { render(); };
    </script>
