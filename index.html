<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5STARS RECIPES ⭐️ המאגר המלא</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; }
        .recipe-card:hover { transform: translateY(-4px); transition: all 0.3s ease; }
    </style>
</head>
<body class="text-slate-900 pb-20">

    <header class="sticky top-0 z-50 bg-orange-600 text-white shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <h1 class="text-3xl font-black tracking-tight cursor-pointer" onclick="window.location.reload()">5STARS RECIPES</h1>
            <div class="flex gap-2 w-full md:w-auto">
                <input type="text" id="searchInput" placeholder="חפש מתכון (מרק, בשר, לייזה...)" class="w-full md:w-80 px-4 py-2 rounded-full text-slate-800 outline-none focus:ring-4 focus:ring-orange-300">
                <button onclick="toggleAddModal()" class="bg-white text-orange-600 px-6 py-2 rounded-full font-bold hover:bg-orange-50 transition-colors flex items-center gap-2 shrink-0 shadow-sm">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> הוספה
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-10">
        <div id="recipesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 text-center py-20 text-slate-400">
            טוען מתכונים...
        </div>
    </main>

    <div id="addModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2"><i data-lucide="utensils" class="text-orange-500"></i> הוספת מתכון</h2>
            <div class="space-y-4">
                <input type="text" id="newTitle" placeholder="שם המתכון" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:border-orange-500">
                <input type="text" id="newUrl" placeholder="לינק למתכון" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:border-orange-500">
                <select id="newCat" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                    <option value="כללי">בחר קטגוריה</option>
                    <option value="מרקים">מרקים</option>
                    <option value="בשר">בשר</option>
                    <option value="דגים">דגים</option>
                    <option value="סלטים">סלטים</option>
                    <option value="אסיאתי">אסיאתי</option>
                </select>
                <div class="flex gap-3 mt-6">
                    <button onclick="addRecipe()" class="flex-1 bg-orange-600 text-white py-4 rounded-2xl font-bold hover:bg-orange-700">שמור</button>
                    <button onclick="toggleAddModal()" class="flex-1 bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold hover:bg-slate-200">ביטול</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const staticRecipes = [
            { title: "מרק דלעת, כמון ותפוזים", category: "מרקים", url: "https://www.hashulchan.co.il/%D7%9E%D7%AA%D7%9B%D7%95%D7%A0%D7%99%D7%9D/%D7%9E%D7%A8%D7%A7-%D7%9Adjust-%D7%9C%D7%A2%D7%AA-%D7%91%D7%A0%D7%99%D7%97%D7%95%D7%97-%D7%9Adjust-%D7%9E%D7%95%D7%9F-%D7%95%D7%AA%D7%A4%D7%95%D7%96%D7%99%D7%9D/", img: "https://images.unsplash.com/photo-1547592166-23ac45744acd?w=600" },
            { title: "מרק כרובית וחלב שקדים", category: "מרקים", url: "https://www.hashulchan.co.il/%D7%9E%D7%AA%D7%9B%D7%95%D7%A0%D7%99%D7%9D/%D7%9E%D7%A8%D7%A7-%D7%9B%D7%A8%D7%95%D7%91%D7%99%D7%AA-%D7%A2%D7%9D-%D7%97%D7%9C%D7%91-%D7%A9%D7%A7%D7%93%D7%99%D7%9D/", img: "https://images.unsplash.com/photo-1594756202469-9ff9799b2e42?w=600" },
            { title: "בשר מפורק (אסאדו) - 10 דקות", category: "בשר", url: "https://www.10dakot.co.il/recipe/%D7%90%D7%A1%D7%90%D7%93%D7%95-%D7%9E%D7%A4%D7%95%D7%A8%D7%A7/", img: "https://images.unsplash.com/photo-1551024506-0bccd828d307?w=600" },
            { title: "ראמן עוף עשיר - אהרוני", category: "מרקים", url: "https://share.google/ydCRteDbgbYBf4vVb", img: "https://images.unsplash.com/photo-1547592166-23ac45744acd?w=600" },
            { title: "קציצות כרובית וסולת של מרב", category: "צמחוני", url: "https://lizapanelim.com/%D7%A7%D7%A6%D7%99%D7%A6%D7%95%D7%AA-%D7%9B%D7%A8%D7%95%D7%91%D7%99%D7%AA-%D7%9ה%D7%95%D7%A8%D7%A1%D7%95%D7%AA-%D7%A9%D7%9C-%D7%9E%D7%A8%D7%91/", img: "https://images.unsplash.com/photo-1541832676-9b763b0239ab?w=600" },
            { title: "חריימה דגים - שף רפי כהן", category: "דגים", url: "https://www.hashulchan.co.il/%D7%9E%D7%AA%D7%9B%D7%95%D7%A0%D7%99%D7%9D/%D7%9BD%D7%A8%D7%99%D7%99%D7%9E%D7%94-%D7%A9%D7%9C-%D7%A9%D7%A3-%D7%A8%D7%A4%D7%99-%D7%9B%D7%94%D7%9F/", img: "https://images.unsplash.com/photo-1534604973900-c41ab4c5e636?w=600" },
            { title: "סלט ענבים במסעדת ממו", category: "סלטים", url: "https://search.app/E5EZcNXozyW5dTU18", img: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600" },
            { title: "סלופי ג'ו לילדים", category: "בשר", url: "https://search.app/fSJXr9fUZCM1j7Wz5", img: "https://images.unsplash.com/photo-1550507992-eb63ffee0847?w=600" },
            { title: "כנפי צ'ילי דביקות", category: "בשר", url: "https://share.google/BZuJNjrQK9lNok1E5", img: "https://images.unsplash.com/photo-1527477396000-e27163b481c2?w=600" },
            { title: "פאד תאי של השולחן", category: "אסיאתי", url: "https://www.hashulchan.co.il/%D7%9E%D7%AA%D7%9B%D7%95%D7%A0%D7%99%D7%9D/%d7%a4%d7%90%d7%93-%d7%aa%d7%90%d7%99-2/", img: "https://images.unsplash.com/photo-1559339352-11d035aa65de?w=600" },
            { title: "לזניה ריקוטה ותרד", category: "איטלקי", url: "https://www.hashulchan.co.il/%D7%9E%D7%AA%D7%9B%D7%95%D7%A0%D7%99%D7%9D/%D7%9C%D7%96%D7%A0%D7%99%D7%94-%D7%A8%D7%99%D7%A7%D7%95%D7%98%D7%94-%D7%95%D7%AA%D7%A8%D7%93/", img: "https://images.unsplash.com/photo-1551183053-bf91a1d81141?w=600" },
            { title: "עוגת תפוחים בלתי נראית", category: "קינוחים", url: "https://rotteml.com/%D7%A2%D7%95%D7%92%D7%AA-%D7%AA%D7%A4%D7%95%D7%96%D7%99%D7%9D-%D7%91%D7%9C%D7%AA%D7%99-%D7%A0%D7%A8%D7%90%D7%99%D7%AA/", img: "https://images.unsplash.com/photo-1568571780765-9276ac6b75bb?w=600" },
            { title: "בורקס דפי אורז", category: "מאפים", url: "https://foody.co.il/foody_recipe/%d7%91%d7%95%d7%a8%d7%a7%d7%a1-%d7%93%d7%a4%d7%99-%d7%90%d7%95%d7%a8%d7%96-%d7%9c%d7%9c%d7%90-%d7%92%d7%9c%d7%95%d7%98%d7%9f/", img: "https://images.unsplash.com/photo-1509440159596-0249088772ff?w=600" }
            // הוסף עוד כאן בהמשך
        ];

        let userRecipes = JSON.parse(localStorage.getItem('myRecipes')) || [];
        
        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('recipesGrid');
            const allRecipes = [...userRecipes, ...staticRecipes];
            
            const filtered = allRecipes.filter(r => 
                r.title.toLowerCase().includes(term) || 
                r.category.toLowerCase().includes(term)
            );

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="col-span-full">לא נמצאו מתכונים...</div>';
                return;
            }

            grid.innerHTML = filtered.map(r => `
                <div class="recipe-card bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-200 flex flex-col h-full">
                    <div class="h-44 overflow-hidden relative">
                        <img src="${r.img || 'https://images.unsplash.com/photo-1495195129352-aec325a55b65?w=600'}" class="w-full h-full object-cover">
                        <span class="absolute top-3 right-3 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-xs font-bold text-slate-700 shadow-sm">${r.category}</span>
                    </div>
                    <div class="p-5 flex-grow flex flex-col justify-between items-start">
                        <h3 class="text-xl font-bold text-slate-800 mb-4 leading-tight">${r.title}</h3>
                        <a href="${r.url}" target="_blank" class="w-full py-3 bg-orange-600 text-white text-center rounded-xl font-bold hover:bg-orange-700 transition-colors shadow-md">
                            צפה במתכון המלא
                        </a>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function toggleAddModal() { document.getElementById('addModal').classList.toggle('hidden'); }

        function addRecipe() {
            const title = document.getElementById('newTitle').value;
            const url = document.getElementById('newUrl').value;
            const category = document.getElementById('newCat').value;
            if(!title || !url) return alert('נא למלא שם ולינק');
            
            userRecipes.unshift({ title, url, category });
            localStorage.setItem('myRecipes', JSON.stringify(userRecipes));
            render();
            toggleAddModal();
            document.getElementById('newTitle').value = "";
            document.getElementById('newUrl').value = "";
        }

        document.getElementById('searchInput').addEventListener('input', render);
        window.onload = () => { render(); lucide.createIcons(); };
    </script>
</body>
</html>
