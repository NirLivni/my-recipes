<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5STARS RECIPES - המתכונים שלי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #fafafa; }
        .recipe-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="text-slate-900">

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <h1 class="text-2xl font-bold tracking-tight text-slate-800">5STARS RECIPES</h1>
            <div class="relative max-w-md w-full">
                <i data-lucide="search" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                <input type="text" id="searchInput" placeholder="חפש מתכון או קטגוריה..." 
                    class="w-full pr-10 pl-4 py-2 bg-slate-100 border-none rounded-full focus:ring-2 focus:ring-slate-400 outline-none transition-all">
            </div>
        </div>
    </header>

    <section class="py-12 px-4 text-center">
        <h2 class="text-4xl font-extrabold text-slate-900 mb-2">המתכונים הנבחרים שלי</h2>
        <p class="text-slate-500 max-w-lg mx-auto">ריכוז כל המתכונים שקיבלו 5 כוכבים במטבח שלנו. בתיאבון!</p>
    </section>

    <main class="max-w-6xl mx-auto px-4 pb-20">
        <div id="recipesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <script>
        // מאגר המתכונים שלך - כאן תוכל להוסיף עוד בקלות!
        const recipes = [
            {
                id: 1,
                title: "פסטה קרבונרה איטלקית",
                category: "פסטה",
                rating: 5,
                image: "https://images.unsplash.com/photo-1612874742237-6526221588e3?auto=format&fit=crop&q=80&w=800"
            },
            {
                id: 2,
                title: "סלט יווני מרענן",
                category: "סלטים",
                rating: 5,
                image: "https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?auto=format&fit=crop&q=80&w=800"
            },
            {
                id: 3,
                title: "המבורגר בקר ביתי",
                category: "בשרים",
                rating: 4,
                image: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&q=80&w=800"
            },
            {
                id: 4,
                title: "עוגת שוקולד חמה",
                category: "קינוחים",
                rating: 5,
                image: "https://images.unsplash.com/photo-1564035032355-2e6b5396666d?auto=format&fit=crop&q=80&w=800"
            }
        ];

        function renderRecipes(filter = "") {
            const grid = document.getElementById('recipesGrid');
            grid.innerHTML = "";

            const filtered = recipes.filter(r => 
                r.title.includes(filter) || r.category.includes(filter)
            );

            filtered.forEach(recipe => {
                const card = `
                    <div class="recipe-card group bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-100 transition-all duration-300 hover:shadow-xl">
                        <div class="relative overflow-hidden aspect-video">
                            <img src="${recipe.image}" alt="${recipe.title}" class="w-full h-full object-cover transition-transform duration-500">
                            <span class="absolute top-3 right-3 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-bold text-slate-700 shadow-sm">${recipe.category}</span>
                        </div>
                        <div class="p-5">
                            <h3 class="text-xl font-bold text-slate-800 mb-2">${recipe.title}</h3>
                            <div class="flex items-center gap-1 mb-4">
                                ${Array(5).fill(0).map((_, i) => `<i data-lucide="star" class="w-4 h-4 ${i < recipe.rating ? 'fill-yellow-400 text-yellow-400' : 'text-slate-200'}"></i>`).join('')}
                            </div>
                            <button class="w-full py-2 bg-slate-900 text-white rounded-xl font-semibold hover:bg-slate-700 transition-colors">צפה במתכון</button>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
            lucide.createIcons();
        }

        // האזנה לחיפוש
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderRecipes(e.target.value);
        });

        // רינדור ראשוני
        renderRecipes();
        lucide.createIcons();
    </script>
</body>
</html>
